{% load static %}





<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Portfolio</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" sizes="32x32" href="{% static 'images/favicon-32.png' %}">
<link rel="icon" sizes="16x16" href="{% static 'images/favicon-16.png' %}">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        html {
            scroll-behavior: smooth;
        }

        /* ✅ SAFETY FIX: ensure content is visible even if JS fails */
        section {
            opacity: 1 !important;
            transform: none !important;
            filter: none !important;
        }
    </style>
</head>

<body>
<canvas id="particleCanvas"></canvas>
<!-- NAVBAR -->
<nav class="navbar" id="navbar">

    <div class="logo">
        Kripa<span>Poudel</span>
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <ul class="nav-links" id="navLinks">

        <li><a href="#home" class="nav-link">Home</a></li>
        <li><a href="#about" class="nav-link">About</a></li>
        <li><a href="#skills" class="nav-link">Skills</a></li>
        <li><a href="#projects" class="nav-link">Projects</a></li>
        <li><a href="#contact" class="nav-link">Contact</a></li>

        <li>
            <button type="button" onclick="toggleTheme()" class="theme-btn">
                🌙
            </button>
        </li>

        <li>
    <a href="{% url 'cv' %}" class="cv-btn">
        View CV
            </a>
        </li>

    </ul>

</nav>

<!-- PAGE CONTENT -->
{% block content %}
{% endblock %}

<!-- JS -->
<script src="{% static 'js/main.js' %}"></script>
<!-- CV MODAL -->
<div id="cvModal" class="cv-modal">

    <div class="cv-modal-content">

        <span class="cv-close" onclick="closeCVModal()">&times;</span>

        <iframe 
            src="{% static 'cv.pdf' %}" 
            class="cv-frame">
        </iframe>

    </div>

</div>
</body>
</html>
